<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, sans-serif">
  <rect width="800" height="420" fill="#f9fafb"/>
  <text x="30" y="34" font-size="17" font-weight="700" fill="#111">언제 들어왔나 vs 벌었나 — 개념도</text>
  <text x="30" y="54" font-size="12" fill="#9ca3af">실제 수치 아님. 블록타임으로 진입 시점을 구간별로 가른 패턴.</text>

  <!-- zero line -->
  <line x1="60" y1="230" x2="770" y2="230" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="64" y="224" font-size="11" fill="#9ca3af">±0</text>
  <text x="30" y="120" font-size="11" fill="#16a34a">수익</text>
  <text x="30" y="330" font-size="11" fill="#dc2626">손실</text>

  <!-- bars: early = tall green, late = red -->
  <!-- x groups -->
  <g>
    <rect x="95" y="80" width="70" height="150" fill="#16a34a"/>
    <rect x="215" y="120" width="70" height="110" fill="#22c55e"/>
    <rect x="335" y="165" width="70" height="65" fill="#86efac"/>
    <rect x="455" y="230" width="70" height="55" fill="#fca5a5"/>
    <rect x="575" y="230" width="70" height="95" fill="#ef4444"/>
    <rect x="660" y="230" width="70" height="120" fill="#dc2626"/>
  </g>

  <!-- x labels -->
  <text x="130" y="250" font-size="11" fill="#374151" text-anchor="middle">프빗/배포 전</text>
  <text x="250" y="250" font-size="11" fill="#374151" text-anchor="middle">배포 직후</text>
  <text x="370" y="250" font-size="11" fill="#374151" text-anchor="middle">공개 초반</text>
  <text x="490" y="300" font-size="11" fill="#374151" text-anchor="middle">중반</text>
  <text x="610" y="342" font-size="11" fill="#374151" text-anchor="middle">1M 블록 이후</text>
  <text x="695" y="367" font-size="11" fill="#374151" text-anchor="middle">후기</text>

  <!-- annotations -->
  <text x="130" y="72" font-size="11" fill="#166534" text-anchor="middle" font-weight="700">84클러스터 중 손실 6개</text>
  <text x="640" y="392" font-size="12" fill="#b91c1c" text-anchor="middle" font-weight="700">늦게 = 절반이 손실. 큰돈일수록 더 크게 잃음</text>
</svg>
