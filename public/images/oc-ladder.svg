<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="system-ui, sans-serif">
  <rect width="820" height="470" fill="#f9fafb"/>
  <text x="30" y="36" font-size="18" font-weight="700" fill="#111">온체인 읽는 법 5단계</text>
  <text x="30" y="57" font-size="12" fill="#9ca3af">한 계단씩. 앞 단계를 알아야 다음이 보인다.</text>

  <!-- ascending dotted path -->
  <polyline fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 5"
    points="92,305 250,250 408,195 566,140 724,85"/>

  <!-- cards -->
  <g>
    <rect x="20"  y="305" width="145" height="115" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <rect x="178" y="250" width="145" height="115" rx="12" fill="#e0f2fe" stroke="#bae6fd"/>
    <rect x="336" y="195" width="145" height="115" rx="12" fill="#dcfce7" stroke="#bbf7d0"/>
    <rect x="494" y="140" width="145" height="115" rx="12" fill="#fef9c3" stroke="#fde68a"/>
    <rect x="652" y="85"  width="145" height="115" rx="12" fill="#fee2e2" stroke="#fecaca"/>
  </g>

  <!-- badges + titles -->
  <g font-weight="700">
    <circle cx="46"  cy="331" r="15" fill="#4f46e5"/><text x="46"  y="336" font-size="15" fill="#fff" text-anchor="middle">1</text>
    <circle cx="204" cy="276" r="15" fill="#0284c7"/><text x="204" y="281" font-size="15" fill="#fff" text-anchor="middle">2</text>
    <circle cx="362" cy="221" r="15" fill="#16a34a"/><text x="362" y="226" font-size="15" fill="#fff" text-anchor="middle">3</text>
    <circle cx="520" cy="166" r="15" fill="#ca8a04"/><text x="520" y="171" font-size="15" fill="#fff" text-anchor="middle">4</text>
    <circle cx="678" cy="111" r="15" fill="#dc2626"/><text x="678" y="116" font-size="15" fill="#fff" text-anchor="middle">5</text>
  </g>
  <g font-size="15" font-weight="700" fill="#111">
    <text x="72"  y="336">tx 읽기</text>
    <text x="230" y="281">데이터 긁기</text>
    <text x="388" y="226">손익 계산</text>
    <text x="546" y="171">지갑 묶기</text>
    <text x="704" y="116">전체 흐름</text>
  </g>
  <g font-size="12" fill="#4b5563">
    <text x="36"  y="372">거래 하나를</text><text x="36" y="390">눈으로 완독</text>
    <text x="194" y="317">누가 언제</text><text x="194" y="335">얼마 샀나</text>
    <text x="352" y="262">누가 벌고</text><text x="352" y="280">누가 물렸나</text>
    <text x="510" y="207">연결된 지갑</text><text x="510" y="225">= 세력 찾기</text>
    <text x="668" y="152">체인 자금</text><text x="668" y="170">흐름 읽기</text>
  </g>
</svg>
