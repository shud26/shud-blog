<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 210" font-family="system-ui, sans-serif">
  <rect width="820" height="210" fill="#f9fafb"/>
  <text x="30" y="34" font-size="17" font-weight="700" fill="#111">온체인 분석이 보여주는 것</text>
  <text x="30" y="54" font-size="12" fill="#9ca3af">한 지갑에서 시작해 세력의 정체까지, 점점 넓게.</text>

  <g>
    <rect x="14"  y="80" width="140" height="72" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
    <rect x="184" y="80" width="140" height="72" rx="10" fill="#e0f2fe" stroke="#bae6fd"/>
    <rect x="354" y="80" width="140" height="72" rx="10" fill="#dcfce7" stroke="#bbf7d0"/>
    <rect x="524" y="80" width="140" height="72" rx="10" fill="#fef9c3" stroke="#fde68a"/>
    <rect x="694" y="80" width="112" height="72" rx="10" fill="#fee2e2" stroke="#fecaca"/>
  </g>

  <!-- arrows -->
  <g fill="#94a3b8">
    <polygon points="158,116 178,110 178,122"/>
    <polygon points="328,116 348,110 348,122"/>
    <polygon points="498,116 518,110 518,122"/>
    <polygon points="668,116 688,110 688,122"/>
  </g>

  <g font-size="13" fill="#111" text-anchor="middle">
    <text x="84"  y="112" font-weight="700">지갑 하나</text><text x="84"  y="132" font-size="11" fill="#4b5563">주소 = 통장</text>
    <text x="254" y="112" font-weight="700">거래 내역</text><text x="254" y="132" font-size="11" fill="#4b5563">언제·얼마</text>
    <text x="424" y="112" font-weight="700">누가 벌었나</text><text x="424" y="132" font-size="11" fill="#4b5563">지갑별 손익</text>
    <text x="594" y="112" font-weight="700">연결된 지갑</text><text x="594" y="132" font-size="11" fill="#4b5563">클러스터</text>
    <text x="750" y="112" font-weight="700">세력 정체</text><text x="750" y="132" font-size="11" fill="#4b5563">누가 운전</text>
  </g>
</svg>
